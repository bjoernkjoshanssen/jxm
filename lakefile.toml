name = "ptyche"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Ptyche"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"


[[lean_lib]]
name = "Ptyche"
